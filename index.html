<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Clar & Erika's Zootopia Wedding Town</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #f4e3c5;
            --ui-bg: #8c6b4f;
            --ui-border: #4a3424;
            --btn-bg: #e67e22;
            --btn-hover: #d35400;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #222;
            font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh; 
            width: 100dvw;
        }

        /* 預設電腦版 (橫式) */
        #game-container {
            position: relative;
            width: min(98vw, 95dvh * 1.8333);
            height: min(95dvh, 98vw * 0.5454);
            background-color: var(--primary-bg);
            background-image: url('placeholder_map_bg.png'); /* 電腦版橫式底圖 */
            background-size: 100% 100%; 
            background-position: center;
            border: 4px solid var(--ui-border);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: background-image 0.3s ease; /* 平滑切換背景 */
        }

        .building {
            position: absolute;
            background: rgba(255, 255, 255, 0.0);
            border: 2px dashed rgba(255, 255, 255, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Noto Sans TC', sans-serif;
            font-weight: bold;
            font-size: 16px;
            color: transparent;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 5; 
        }

        .building.active, .building:hover {
            background: rgba(255, 255, 255, 0.4);
            border: 3px dashed #fff;
            color: #333;
            text-shadow: 1px 1px 2px #fff;
        }

        /* 電腦版建築物位置 (對應 placeholder_map_bg.png) */
        #bldg-gallery { top: 12%; left: 8%; width: 22%; height: 30%; }
        #bldg-cake { top: 8%; left: 64%; width: 26%; height: 32%; }
        #bldg-cinema { top: 52%; left: 5%; width: 26%; height: 38%; }
        #bldg-townhall { top: 55%; left: 68%; width: 25%; height: 35%; }

        #player {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px; 
            height: 120px; 
            background-image: url('fox.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom center; 
            background-color: transparent; 
            transform: translate(-50%, -100%); 
            z-index: 10;
            transition: top 0.1s linear, left 0.1s linear;
            border: none;
            pointer-events: none; 
        }

        #bottom-ui {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--ui-bg);
            border: 4px solid var(--ui-border);
            padding: 10px 20px;
            border-radius: 8px;
            display: flex;
            gap: 20px;
            align-items: center;
            z-index: 20;
        }

        .avatar-btn {
            font-size: 24px;
            background: #fff;
            border: 2px solid var(--ui-border);
            border-radius: 4px;
            cursor: pointer;
            padding: 5px;
        }

        .instructions {
            color: white;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            margin-left: 20px;
            line-height: 1.5;
        }

        .modal {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: var(--primary-bg);
            border: 6px solid var(--ui-border);
            border-radius: 8px;
            width: 85%;
            height: 85%;
            padding: 20px;
            position: relative;
            display: flex;
            flex-direction: column;
            box-sizing: border-box; 
        }

        .close-btn {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 28px;
            font-weight: bold;
            color: var(--ui-border);
            cursor: pointer;
            font-family: 'Press Start 2P', cursive;
            z-index: 110;
        }

        .modal-body {
            flex: 1;
            margin-top: 15px;
            border: 2px solid #ccc;
            background: #fff;
            overflow-y: auto; 
            overflow-x: hidden;
            padding: 20px;
            display: block; 
            text-align: center; 
        }

        .story-container {
            display: flex;
            flex-direction: row; 
            justify-content: center;
            align-items: flex-start; 
            gap: 20px; 
            width: 100%;
            margin-bottom: 25px;
        }

        .story-img, .certificate-img {
            cursor: zoom-in;
            border: 4px solid var(--ui-border); 
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); 
            display: inline-block;
            transition: transform 0.2s;
            max-width: 100%;
        }

        .story-img:hover, .certificate-img:hover {
            transform: scale(1.02);
        }

        .story-img {
            flex: 1; 
            max-width: 48%; 
            max-height: 55vh; 
            width: auto;
            height: auto;
            object-fit: contain; 
        }

        .certificate-img {
            max-height: 50vh;
            height: auto; 
            object-fit: contain;
            margin-bottom: 20px;
        }

        #lightbox {
            display: none;
            position: absolute; 
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }

        #lightbox img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            border: 4px solid var(--primary-bg);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .lightbox-close {
            position: absolute;
            top: 20px; right: 30px;
            font-size: 50px;
            color: white;
            cursor: pointer;
            font-family: sans-serif;
            font-weight: bold;
            user-select: none;
        }

        .link-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background-color: var(--btn-bg);
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            border: 3px solid #b35900;
            transition: background 0.2s;
            font-size: 18px;
        }

        /* ========================================================
           手機版 RWD (寬度小於 1024px 或是 觸控螢幕)
           ======================================================== */
        @media screen and (max-width: 1024px), (hover: none) and (pointer: coarse) {
            
            #bottom-ui, #player {
                display: none !important;
            }

            /* 核心修復：取消強制旋轉，改為載入直式底圖 */
            #game-container {
                /* 加上 !important 強制覆蓋電腦版背景 */
                background-image: url('mobile_map_bg.png') !important;
                
                width: 100dvw !important;
                height: 100dvh !important;
                max-width: none !important;
                max-height: none !important;
                border: none;
                border-radius: 0;
                /* 取消旋轉 */
                transform: none !important;
                position: relative;
                top: auto;
                left: auto;
            }

            /* 🚨 關鍵重構：你必須根據 mobile_map_bg.png 的畫面，重新調整這四個區域的數值！ */
            /* 以下為佔位範例數值，請自行打開瀏覽器 F12 微調 top / left / width / height */
            #bldg-gallery { top: 15%; left: 10%; width: 35%; height: 15%; }
            #bldg-cake { top: 35%; left: 55%; width: 35%; height: 15%; }
            #bldg-cinema { top: 55%; left: 10%; width: 35%; height: 15%; }
            #bldg-townhall { top: 75%; left: 55%; width: 35%; height: 15%; }

            /* 手機版視窗 UI 微調 */
            .modal-content {
                width: 95%;
                height: 95%;
                padding: 10px;
            }
            .modal-body {
                padding: 15px;
                margin-top: 10px;
            }
            .story-container {
                flex-direction: column; 
                align-items: center;
                gap: 15px;
            }
            .story-img {
                max-width: 95%; 
                max-height: none; 
            }
            .close-btn {
                top: 5px; right: 10px; font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="building" id="bldg-gallery" onclick="openModal('modal-gallery')" data-modal="modal-gallery">美術館</div>
        <div class="building" id="bldg-cake" onclick="openModal('modal-cake')" data-modal="modal-cake">蛋糕店</div>
        <div class="building" id="bldg-cinema" onclick="openModal('modal-cinema')" data-modal="modal-cinema">電影院</div>
        <div class="building" id="bldg-townhall" onclick="openModal('modal-townhall')" data-modal="modal-townhall">戶政事務所</div>

        <div id="player"></div>

        <div id="bottom-ui">
            <button class="avatar-btn" onclick="setAvatar('rabbit')">🐰</button>
            <button class="avatar-btn" onclick="setAvatar('fox')">🦊</button>
            <div class="instructions">
                Move: WASD / Arrows<br>
                Enter: Space<br>
                Exit: Esc
            </div>
        </div>

        <div class="modal" id="modal-gallery">
            <div class="modal-content">
                <span class="close-btn" onclick="closeModal('modal-gallery')">X</span>
                <h2 style="font-family: 'Press Start 2P', cursive; text-align: center; font-size: 1.2rem;">Art Gallery</h2>
                <div class="modal-body">
                    <img src="https://cdn-icons-png.flaticon.com/512/3342/3342137.png" width="80" alt="Gallery Icon" style="margin-bottom: 15px;">
                    <h3>歡迎來到我們的婚紗畫廊！</h3>
                    <p style="font-size: 0.9rem;">為提供最高畫質的觀賞體驗，所有照片皆存放於 Google 相簿中。</p>
                    <a href="https://photos.app.goo.gl/EXx1sCvesCpSacpx6" target="_blank" class="link-btn">點此開啟相簿</a>
                </div>
            </div>
        </div>

        <div class="modal" id="modal-cake">
            <div class="modal-content">
                <span class="close-btn" onclick="closeModal('modal-cake')">X</span>
                <h2 style="font-family: 'Press Start 2P', cursive; text-align: center; font-size: 1.2rem;">Fruit Cake Shop</h2>
                <div class="modal-body">
                    <div class="story-container">
                        <img src="line.gif" alt="甜蜜對話" class="story-img" onclick="openLightbox(this.src)" onerror="this.style.display='none';">
                        <img src="cake.jpg" alt="折田菓舖水果蛋糕" class="story-img" onclick="openLightbox(this.src)" onerror="this.style.display='none';">
                    </div>
                    <h3 style="margin: 5px 0;">我們的甜蜜故事</h3>
                    <p style="font-size: 0.8rem;">點擊圖片可放大。歡迎來到水果蛋糕店，這裡是我們相遇的地方。</p>
                </div>
            </div>
        </div>

        <div class="modal" id="modal-cinema">
            <div class="modal-content">
                <span class="close-btn" onclick="closeModal('modal-cinema')">X</span>
                <h2 style="font-family: 'Press Start 2P', cursive; text-align: center; font-size: 1.2rem;">Cinema</h2>
                <div class="modal-body" style="background: #111; color: white;">
                    <img src="https://cdn-icons-png.flaticon.com/512/3172/3172568.png" width="80" alt="Cinema Icon" style="margin-bottom: 15px; filter: invert(1);">
                    <h3>婚禮微電影放映室</h3>
                    <p style="font-size: 0.9rem;">點擊下方按鈕前往觀賞我們的小短片。</p>
                    <a href="https://photos.app.goo.gl/boz55HEGNNb9WQT2A" target="_blank" class="link-btn">開啟完整影片</a>
                </div>
            </div>
        </div>

        <div class="modal" id="modal-townhall">
            <div class="modal-content">
                <span class="close-btn" onclick="closeModal('modal-townhall')">X</span>
                <h2 style="font-family: 'Press Start 2P', cursive; text-align: center; margin-bottom: 5px; font-size: 1.2rem;">Town Hall</h2>
                <div class="modal-body">
                    <img src="application.png" alt="結婚書約" class="certificate-img" onclick="openLightbox(this.src)" onerror="this.style.display='none'; alert('未偵測到 application.png');">
                    <hr style="width: 100%; border: 1px dashed #ccc; margin-bottom: 10px;">
                    <div class="under-construction" style="padding: 10px; margin-bottom: 10px;">
                        🚧 賓客留言板建置中 🚧<br>
                        <span style="font-size: 12px; color: #555; font-weight: normal;">敬請期待！</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="lightbox" onclick="closeLightbox()">
            <span class="lightbox-close">&times;</span>
            <img id="lightbox-img" src="" alt="放大預覽" onclick="event.stopPropagation();">
        </div>

    </div>

    <script>
        let isModalOpen = false;
        let currentBuildingOver = null; 

        const player = document.getElementById('player');
        const buildings = document.querySelectorAll('.building');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const bottomUI = document.getElementById('bottom-ui');
        
        let playerX = 50; 
        let playerY = 50;
        const speed = 1.5; 

        const keys = {
            ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false,
            w: false, a: false, s: false, d: false
        };

        function isColliding(rect1, rect2) {
            return !(
                rect1.top > rect2.bottom ||
                rect1.right < rect2.left ||
                rect1.bottom < rect2.top ||
                rect1.left > rect2.right
            );
        }

        window.addEventListener('keydown', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = true;

            if ((e.key === ' ' || e.code === 'Space') && !isModalOpen && window.getComputedStyle(bottomUI).display !== 'none') {
                e.preventDefault(); 
                if (currentBuildingOver) {
                    openModal(currentBuildingOver.getAttribute('data-modal'));
                }
            }

            if (e.key === 'Escape') {
                if (lightbox.style.display === 'flex') {
                    closeLightbox();
                } else if (isModalOpen) {
                    closeAllModals();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (keys.hasOwnProperty(e.key)) keys[e.key] = false;
        });

        function gameLoop() {
            if (window.getComputedStyle(bottomUI).display === 'none') {
                requestAnimationFrame(gameLoop);
                return;
            }

            if (!isModalOpen) {
                if (keys.ArrowUp || keys.w) playerY = Math.max(0, playerY - speed);
                if (keys.ArrowDown || keys.s) playerY = Math.min(100, playerY + speed);
                if (keys.ArrowLeft || keys.a) playerX = Math.max(0, playerX - speed);
                if (keys.ArrowRight || keys.d) playerX = Math.min(100, playerX + speed);

                player.style.left = playerX + '%';
                player.style.top = playerY + '%';

                const playerRect = player.getBoundingClientRect();
                let foundCollision = null;

                buildings.forEach(bldg => {
                    const bldgRect = bldg.getBoundingClientRect();
                    if (isColliding(playerRect, bldgRect)) {
                        bldg.classList.add('active'); 
                        foundCollision = bldg;
                    } else {
                        bldg.classList.remove('active');
                    }
                });

                currentBuildingOver = foundCollision;
            }

            requestAnimationFrame(gameLoop);
        }
        
        requestAnimationFrame(gameLoop);

        function setAvatar(type) {
            if (type === 'rabbit') {
                player.style.backgroundImage = "url('rabbit.png')";
            } else if (type === 'fox') {
                player.style.backgroundImage = "url('fox.png')";
            }
        }

        function openModal(modalId) {
            document.getElementById(modalId).style.display = 'flex';
            
            const modalBody = document.querySelector(`#${modalId} .modal-body`);
            if(modalBody) {
                modalBody.scrollTop = 0;
            }
            
            isModalOpen = true;
            keys['w'] = keys['a'] = keys['s'] = keys['d'] = false; 
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
            setTimeout(() => { isModalOpen = false; }, 100);
        }

        function closeAllModals() {
            document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
            setTimeout(() => { isModalOpen = false; }, 100);
        }

        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.style.display = 'flex';
        }

        function closeLightbox() {
            lightbox.style.display = 'none';
            lightboxImg.src = '';
        }
    </script>
</body>
</html>
